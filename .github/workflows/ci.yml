name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Typecheck (zero-error baseline)
        run: npx tsc --noEmit
      - name: Unit tests
        run: npx jest --config jest.config.js --maxWorkers=2
      - name: Integration tests
        run: npx jest --config jest.integration.config.js --maxWorkers=2
      - name: Plaintext-token guard (runs when DATABASE_URL secret is set)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -n "$DATABASE_URL" ]; then
            npx tsx scripts/assert-no-plaintext-tokens.ts
          else
            echo "skipped: no DATABASE_URL secret configured"
          fi

  e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx playwright install --with-deps chromium
      - name: E2E tests
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
        run: npm run test:e2e

  # Self-contained E2E against a PRODUCTION build (next start), on a throwaway
  # Postgres service container. No repo secrets required — all secrets are
  # generated inline. Non-blocking: NOT part of the required `gate` check.
  e2e-prod:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: e2e-prod-${{ github.ref }}
      cancel-in-progress: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: outreach_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/outreach_e2e?schema=public
      E2E_BASE_URL: http://localhost:3010
      ANTHROPIC_API_KEY: sk-ci-placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Generate throwaway secrets
        run: |
          echo "NEXTAUTH_SECRET=$(openssl rand -base64 32)" >> "$GITHUB_ENV"
          echo "TOKEN_ENCRYPTION_KEY=$(openssl rand -base64 32)" >> "$GITHUB_ENV"
          echo "CRON_SECRET=$(openssl rand -base64 32)" >> "$GITHUB_ENV"

      - run: npm ci

      - name: Prisma generate + apply schema
        run: |
          npx prisma generate
          npx prisma migrate deploy

      - name: Seed database
        run: npx prisma db seed

      - name: Build (production)
        env:
          NODE_ENV: production
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start production server
        env:
          NODE_ENV: production
        run: |
          npx next start -p 3010 > next-start.log 2>&1 &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for server readiness
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3010/login || echo 000)
            if [ "$code" != "000" ]; then
              echo "Server ready (HTTP $code) after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not become ready in time"
          cat next-start.log
          exit 1

      - name: Run E2E suite (production build)
        run: npx playwright test --workers=2

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Upload server log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: next-start-log
          path: next-start.log
          retention-days: 7
